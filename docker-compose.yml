version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stickerdrop-db
    environment:
      POSTGRES_USER: mule
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: stickerdrop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stickerdrop-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: